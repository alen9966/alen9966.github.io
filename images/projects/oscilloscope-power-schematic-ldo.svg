<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">示波器校准仪电源分立LDO关键部分</title>
  <desc id="desc">按原理图功能和网络名整理的分立LDO示意，包括高压输入、参考运放、反馈和监测。</desc>
  <defs>
    <linearGradient id="bg3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff9f3"/>
      <stop offset="100%" stop-color="#f6fbff"/>
    </linearGradient>
    <linearGradient id="amber3" x1="0" x2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="teal3" x1="0" x2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#94a3b8" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="url(#bg3)"/>
  <text x="70" y="82" fill="#0f172a" font-size="36" font-family="'Microsoft YaHei', sans-serif" font-weight="700">分立 LDO 关键部分</text>
  <text x="70" y="122" fill="#475569" font-size="20" font-family="'Microsoft YaHei', sans-serif">原理图里可以确认正负两路都带参考、反馈、监测和高压晶体管执行级，目标是把 ±310V 收敛到更干净的 ±300V。</text>

  <g filter="url(#shadow3)">
    <rect x="86" y="180" width="240" height="140" rx="28" ry="28" fill="#ffffff"/>
    <rect x="86" y="180" width="240" height="14" rx="28" ry="28" fill="url(#amber3)"/>
    <text x="118" y="242" fill="#0f172a" font-size="28" font-family="'Microsoft YaHei', sans-serif" font-weight="700">高压输入</text>
    <text x="118" y="282" fill="#475569" font-size="20" font-family="'Microsoft YaHei', sans-serif">+310VIN / -310VIN</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="430" y="110" width="360" height="230" rx="30" ry="30" fill="#ffffff"/>
    <rect x="430" y="110" width="360" height="14" rx="30" ry="30" fill="url(#teal3)"/>
    <text x="468" y="176" fill="#0f172a" font-size="30" font-family="'Microsoft YaHei', sans-serif" font-weight="700">参考与误差放大</text>
    <text x="468" y="220" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">REF5025AIDR</text>
    <text x="468" y="256" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">OPA2192IDR</text>
    <text x="468" y="292" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">ADA4622-2ARZ</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="430" y="420" width="360" height="240" rx="30" ry="30" fill="#ffffff"/>
    <rect x="430" y="420" width="360" height="14" rx="30" ry="30" fill="url(#amber3)"/>
    <text x="468" y="486" fill="#0f172a" font-size="30" font-family="'Microsoft YaHei', sans-serif" font-weight="700">高压执行级</text>
    <text x="468" y="528" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">TIP50G / MJE5731AG</text>
    <text x="468" y="564" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">PZTA42-QX / PZTA92(T1G)</text>
    <text x="468" y="606" fill="#475569" font-size="20" font-family="'Microsoft YaHei', sans-serif">把参考控制量变成最终高压输出</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="920" y="130" width="350" height="220" rx="30" ry="30" fill="#ffffff"/>
    <rect x="920" y="130" width="350" height="14" rx="30" ry="30" fill="url(#teal3)"/>
    <text x="958" y="196" fill="#0f172a" font-size="30" font-family="'Microsoft YaHei', sans-serif" font-weight="700">反馈与设定</text>
    <text x="958" y="240" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">FBP / FBN</text>
    <text x="958" y="276" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">VREFA / VREFB</text>
    <text x="958" y="312" fill="#475569" font-size="20" font-family="'Microsoft YaHei', sans-serif">决定输出最后落在 +300V / -300V</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="920" y="430" width="350" height="220" rx="30" ry="30" fill="#ffffff"/>
    <rect x="920" y="430" width="350" height="14" rx="30" ry="30" fill="url(#teal3)"/>
    <text x="958" y="496" fill="#0f172a" font-size="30" font-family="'Microsoft YaHei', sans-serif" font-weight="700">监测与调试</text>
    <text x="958" y="540" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">VMONA / VMONB</text>
    <text x="958" y="576" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">IMONA / IMONB</text>
    <text x="958" y="612" fill="#334155" font-size="22" font-family="'Microsoft YaHei', sans-serif">IPROGA / IPROGB</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="1160" y="690" width="160" height="82" rx="22" ry="22" fill="#ffffff"/>
    <rect x="1160" y="690" width="160" height="12" rx="22" ry="22" fill="url(#amber3)"/>
    <text x="1188" y="744" fill="#0f172a" font-size="28" font-family="'Microsoft YaHei', sans-serif" font-weight="700">±300V</text>
  </g>

  <path d="M326 250 H404" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow3)"/>
  <path d="M610 340 V394" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow3)"/>
  <path d="M790 240 H894" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow3)"/>
  <path d="M790 550 H894" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow3)"/>
  <path d="M1096 352 C1096 408 980 392 790 540" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  <path d="M1270 650 V676" stroke="#475569" stroke-width="5" fill="none" marker-end="url(#arrow3)"/>

  <text x="1110" y="390" fill="#64748b" font-size="18" font-family="'Microsoft YaHei', sans-serif">反馈回到控制环</text>
  <text x="838" y="704" fill="#64748b" font-size="18" font-family="'Microsoft YaHei', sans-serif">调试时配合 TP-REF、TP-LDO-FB 一起看</text>
</svg>
